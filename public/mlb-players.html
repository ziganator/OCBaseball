<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>MLB Players | Owners Club Baseball</title>
    <link rel="stylesheet" href="/styles.css?v=20260709j">
  </head>
  <body>
    <header class="site-header menu-header">
      <div class="header-inner">
        <a class="header-logo" href="/" aria-label="Owners Club Baseball home">
          <img src="/assets/OC%20Icon.png" alt="">
        </a>
        <nav class="nav" aria-label="Main navigation">
          <a href="/">Season</a>
          <a href="/teams.html">Teams</a>
          <a href="/highlanders-lineup.html">Highlanders Lineup</a>
        </nav>
      </div>
    </header>

    <main class="players-shell">
      <section class="players-hero">
        <span class="section-kicker">Players</span>
        <h1>MLB Player List</h1>
        <p>Browse active MLB players, current season stats, and Owners Club roster claims.</p>
      </section>

      <section class="players-page">
        <section class="lineup-card players-controls">
          <h2>Player Pool</h2>
          <div class="players-filter-grid">
            <label>
              Search
              <input id="players-search" type="search" placeholder="Player name">
            </label>
            <label>
              Type
              <select id="players-type">
                <option value="all">All Players</option>
                <option value="hitter">Hitters</option>
                <option value="pitcher">Pitchers</option>
              </select>
            </label>
            <label>
              Team
              <select id="players-team">
                <option value="all">All Teams</option>
              </select>
            </label>
          </div>
          <p id="players-status" class="admin-note" role="status">Loading MLB players...</p>
        </section>

        <section class="lineup-card">
          <div class="table-wrap lineup-table-wrap players-table-wrap">
            <table class="lineup-table players-table">
              <thead>
                <tr>
                  <th>Player</th>
                  <th>Team</th>
                  <th>Pos</th>
                  <th>Owners Club</th>
                  <th class="lineup-stat-col">H/AB</th>
                  <th class="lineup-stat-col">R</th>
                  <th class="lineup-stat-col">1B</th>
                  <th class="lineup-stat-col">2B</th>
                  <th class="lineup-stat-col">3B</th>
                  <th class="lineup-stat-col">HR</th>
                  <th class="lineup-stat-col">RBI</th>
                  <th class="lineup-stat-col">SB</th>
                  <th class="lineup-stat-col">CS</th>
                  <th class="lineup-stat-col">BB</th>
                  <th class="lineup-stat-col">HBP</th>
                  <th class="lineup-stat-col">GIDP</th>
                  <th class="lineup-stat-col">IP</th>
                  <th class="lineup-stat-col">W</th>
                  <th class="lineup-stat-col">L</th>
                  <th class="lineup-stat-col">SV</th>
                  <th class="lineup-stat-col">K</th>
                </tr>
              </thead>
              <tbody id="players-body"></tbody>
            </table>
          </div>
        </section>
      </section>
    </main>

    <footer class="site-footer">
      <span>Owners Club Baseball</span>
    </footer>

    <script src="/mlb-players.js?v=20260709j" type="module"></script>
  </body>
</html>
