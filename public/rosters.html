<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Rosters - Owners Club Baseball</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700;800&family=Oswald:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/styles.css?v=20260720a">
  </head>
  <body>
    <header class="site-header menu-header">
      <div class="header-inner">
        <a class="header-logo" href="/" aria-label="Owners Club Baseball home">
          <img src="/assets/OC%20Icon.png" alt="">
        </a>
        <nav class="nav" aria-label="Main navigation">
          <a href="/">Season</a>
          <a href="/games.html">Games</a>
          <a href="/teams.html">Teams</a>
          <a href="/rosters.html" aria-current="page">Rosters</a>
          <a href="/event-cards.html">Event Cards</a>
          <a href="/archives.html">Archives</a>
          <a href="/admin.html">Admin</a>
        </nav>
      </div>
    </header>

    <main class="players-shell rosters-shell">
      <section class="players-hero">
        <span class="section-kicker">Season 32</span>
        <h1>Rosters</h1>
        <p>View current Owners Club roster claims across the league.</p>
      </section>

      <section class="lineup-card players-controls">
        <h2>Roster Browser</h2>
        <div class="players-filter-grid rosters-filter-grid">
          <label>
            Search
            <input id="rosters-search" type="search" placeholder="Player or team">
          </label>
          <label>
            League
            <select id="rosters-league">
              <option value="all">All Leagues</option>
            </select>
          </label>
          <label>
            Team
            <select id="rosters-team">
              <option value="all">All Teams</option>
            </select>
          </label>
        </div>
        <p id="rosters-status" class="admin-note" role="status">Loading rosters...</p>
      </section>

      <section id="rosters-grid" class="rosters-grid" aria-live="polite"></section>
    </main>

    <footer class="site-footer">
      <a class="footer-logo" href="/" aria-label="Owners Club Baseball home">
        <img src="/assets/OC%20Icon.png" alt="">
      </a>
      <span>Owners Club Baseball ALL RIGHTS RESERVED &reg;</span>
    </footer>

    <script src="/rosters.js?v=20260720a" type="module"></script>
  </body>
</html>
