<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Rosters - Owners Club Baseball</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700;800&family=Oswald:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/styles.css?v=20260720c">
  </head>
  <body>
    <header class="site-header menu-header">
      <div class="header-inner">
        <a class="header-logo" href="/" aria-label="Owners Club Baseball home">
          <img src="/assets/OC%20Icon.png" alt="">
        </a>
        <nav class="nav" aria-label="Main navigation">
          <a href="/">Season</a>
          <a href="/games.html">Games</a>
          <a href="/teams.html">Teams</a>
          <a href="/rosters.html" aria-current="page">Rosters</a>
          <a href="/my-team.html">My Team</a>
          <a href="/event-cards.html">Event Cards</a>
          <a href="/archives.html">Archives</a>
          <a href="/admin.html">Admin</a>
        </nav>
      </div>
    </header>

    <main class="players-shell rosters-shell">
      <section class="players-hero">
        <span class="section-kicker">Season 32</span>
        <h1 id="rosters-title">Rosters</h1>
        <p id="rosters-subtitle">View current Owners Club rosters and lineup usage.</p>
      </section>

      <section class="lineup-card roster-league-card">
        <h2>League Access</h2>
        <div id="rosters-league-tabs" class="roster-league-tabs"></div>
      </section>

      <section class="lineup-card players-controls roster-controls">
        <h2>Roster View</h2>
        <div class="players-filter-grid rosters-filter-grid">
          <label>
            Search
            <input id="rosters-search" type="search" placeholder="Player or team">
          </label>
          <label>
            Team
            <select id="rosters-team">
              <option value="all">All Teams</option>
            </select>
          </label>
          <label>
            Date
            <span class="lineup-date-stepper">
              <button id="rosters-prev-day" class="lineup-arrow-button" type="button" aria-label="Previous day">&larr;</button>
              <input id="rosters-date" type="date">
              <button id="rosters-next-day" class="lineup-arrow-button" type="button" aria-label="Next day">&rarr;</button>
            </span>
          </label>
          <label>
            Stats
            <select id="rosters-range">
              <option value="day">Today</option>
              <option value="week">Last 7 Days</option>
              <option value="twoWeeks">Last 14 Days</option>
              <option value="month">Last 30 Days</option>
              <option value="season">Full Season</option>
            </select>
          </label>
        </div>
        <p id="rosters-window-label" class="admin-note"></p>
        <p id="rosters-status" class="admin-note" role="status">Loading rosters...</p>
      </section>

      <section id="rosters-grid" class="rosters-grid" aria-live="polite"></section>
    </main>

    <footer class="site-footer">
      <a class="footer-logo" href="/" aria-label="Owners Club Baseball home">
        <img src="/assets/OC%20Icon.png" alt="">
      </a>
      <span>Owners Club Baseball ALL RIGHTS RESERVED &reg;</span>
    </footer>

    <dialog id="player-dialog" class="admin-dialog lineup-dialog">
      <div class="lineup-dialog-head">
        <h2 id="player-dialog-title">Player</h2>
        <button class="admin-secondary" type="button" data-dialog-close>Close</button>
      </div>
      <div id="player-dialog-body" class="lineup-dialog-body"></div>
    </dialog>

    <script src="/rosters.js?v=20260720e" type="module"></script>
  </body>
</html>
