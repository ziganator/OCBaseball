<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Game 1 Test | Owners Club Baseball</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700;800&family=Oswald:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/styles.css?v=20260710d">
  </head>
  <body>
    <header class="site-header menu-header">
      <div class="header-inner">
        <a class="header-logo" href="/" aria-label="Owners Club Baseball home">
          <img src="/assets/OC%20Icon.png" alt="">
        </a>
        <nav class="nav" aria-label="Main navigation">
          <a href="/">Season</a>
          <a href="/teams.html">Teams</a>
          <a href="/admin.html">Admin</a>
        </nav>
      </div>
    </header>

    <main class="game-test-shell">
      <section class="players-hero">
        <span class="section-kicker">Test Pages</span>
        <h1>Game 1 Score Test</h1>
        <p>Week 1: Monday, March 30, 2026 through Sunday, April 5, 2026. Sheet scores are compared against MLB game-log calculations.</p>
      </section>

      <section class="game-test-toolbar">
        <label>
          Matchup
          <select id="game-matchup-select"></select>
        </label>
        <button id="calculate-game-button" class="admin-secondary" type="button">Calculate MLB Data</button>
        <p id="game-test-status" class="admin-note" role="status"></p>
      </section>

      <section class="game-scoreboard">
        <div>
          <h2>Scoreboard</h2>
          <div id="game-scoreboard-grid" class="game-scoreboard-grid"></div>
        </div>
        <aside class="game-card-challenge">
          <h2 id="card-challenge-title">Card Challenge</h2>
          <p id="card-challenge-description"></p>
          <div id="card-challenge-list"></div>
        </aside>
      </section>

      <section id="matchup-detail" class="game-matchup-detail"></section>
    </main>

    <footer class="site-footer">
      <span>Owners Club Baseball</span>
    </footer>

    <dialog id="game-detail-dialog" class="admin-dialog game-detail-dialog">
      <div class="lineup-dialog-head">
        <h2 id="game-detail-title">Point Detail</h2>
        <button id="game-detail-close" class="admin-secondary" type="button">Close</button>
      </div>
      <div id="game-detail-body" class="lineup-dialog-body"></div>
    </dialog>

    <script src="/test-game1.js?v=20260710d" type="module"></script>
  </body>
</html>
