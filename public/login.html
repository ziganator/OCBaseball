<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login - Owners Club Baseball</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700;800&family=Oswald:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/styles.css?v=20260708c">
  </head>
  <body>
    <header class="site-header menu-header">
      <div class="header-inner">
        <a class="header-logo" href="/" aria-label="Owners Club Baseball home">
          <img src="/assets/OC%20Icon.png" alt="">
        </a>
        <nav class="nav" aria-label="Main navigation">
          <a href="/">Season</a>
          <a href="/teams.html">Teams</a>
          <a href="/event-cards.html">Event Cards</a>
          <a href="/archives.html">Archives</a>
          <a href="/login.html">Login</a>
        </nav>
      </div>
    </header>

    <main>
      <section class="admin-shell auth-shell">
        <div class="section-heading">
          <h1>Login</h1>
          <p class="section-kicker">Team owners and commissioner tools</p>
        </div>

        <form id="login-form" class="admin-form auth-form">
          <label>
            Email
            <input id="login-email" type="email" autocomplete="email" required>
          </label>
          <label>
            Password
            <input id="login-password" type="password" autocomplete="current-password" required>
          </label>
          <button class="admin-primary" type="submit">Log In</button>
          <p class="auth-switch">Need an account? <a href="/signup.html">Create one here</a>.</p>
          <p id="login-status" class="admin-status" role="status"></p>
        </form>
      </section>
    </main>

    <footer class="site-footer">
      <span>Owners Club Baseball</span>
    </footer>

    <script src="/login.js?v=20260708c" type="module"></script>
  </body>
</html>
